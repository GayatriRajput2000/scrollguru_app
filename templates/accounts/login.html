<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ScrollGuru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: system-ui; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-green-500">SG</h1>
            <p class="text-zinc-400 mt-2">Welcome back, Guru!</p>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

            {% if messages %}
                {% for message in messages %}
                <div class="mb-4 p-3 rounded-2xl text-center text-sm 
                    {% if 'error' in message.tags %}bg-red-500/20 text-red-400{% else %}bg-green-500/20 text-green-400{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="space-y-5">
                    <input type="text" name="username" placeholder="Username or Phone" required
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-green-500">

                    <input type="password" name="password" placeholder="Password" required
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-green-500">

                    <button type="submit"
                            class="w-full bg-green-500 hover:bg-green-400 text-black font-bold py-4 rounded-2xl transition text-lg">
                        Login
                    </button> 
                </div>
            </form>

            <div class="text-center mt-6">
                <p class="text-zinc-400">Don't have an account? 
                    <a href="/signup/" class="text-green-400 hover:underline">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
