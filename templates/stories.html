<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stories - ScrollGuru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { overflow: hidden; background-color: #000; }
        .story-video { height: 100vh; width: 100vw; object-fit: cover; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-black text-white antialiased select-none">

<!-- TOP SYSTEM OVERLAY: Close Button & Progress Tickers -->
<div class="fixed top-0 left-0 right-0 z-50 max-w-md mx-auto px-4 pt-3 pb-10 bg-gradient-to-b from-black/80 to-transparent pointer-events-none">
    
    <!-- Instagram Style Top Progress Bars Holder -->
    <div class="flex gap-1.5 w-full mb-3 px-1">
        <!-- Bars will be auto-generated by JS based on stories count or handled elegantly -->
        <div class="h-[2px] flex-1 bg-zinc-700 rounded-full overflow-hidden">
            <div id="story-progress" class="h-full bg-white w-0 transition-all linear"></div>
        </div>
    </div>

    <!-- Header Meta (User Identity) -->
    <div class="flex items-center justify-between pointer-events-auto">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full overflow-hidden border border-white/20">
                <img id="current-user-avatar" src="https://via.placeholder.com/48" class="w-full h-full object-cover">
            </div>
            <div>
                <p id="current-user-name" class="font-bold text-sm tracking-tight text-white shadow-sm">-</p>
                <p id="current-story-time" class="text-[10px] text-zinc-300 font-medium opacity-80 mt-0.5">-</p>
            </div>
        </div>
        
        <!-- Elegant Glass Close Button -->
        <button onclick="window.history.back()" class="bg-white/10 backdrop-blur-md text-white active:scale-90 p-2 rounded-full border border-white/10 transition-transform">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
</div>

<!-- MAIN FULLSCREEN STORIES VERTICAL/HORIZONTAL SLIDER -->
<div class="flex h-screen overflow-x-auto snap-x snap-mandatory no-scrollbar" id="stories-container">
    {% for user, user_stories in stories_by_user.items %}
        {% for story in user_stories %}
        <div class="min-w-full h-screen snap-center relative bg-black flex items-center justify-center story-slide" 
             data-username="{{ story.user.username }}"
             data-avatar="{% if story.user.profile_pic %}{{ story.user.profile_pic.url }}{% else %}https://via.placeholder.com/48{% endif %}"
             data-time="{{ story.created_at|timesince }} ago"
             id="story-{{ story.id }}">
            
            <video class="story-video" loop muted playsinline preload="auto">
                <source src="{{ story.video.url }}" type="video/mp4">
            </video>

            <!-- Bottom Caption Card (Classic Blurred Glass Box) -->
            {% if story.caption %}
            <div class="absolute bottom-10 left-4 right-4 bg-zinc-950/40 backdrop-blur-md p-4 rounded-2xl border border-white/5 shadow-2xl max-w-sm mx-auto">
                <p class="text-xs font-bold text-emerald-400 mb-1">💡 Guru Insight</p>
                <p class="text-sm font-medium text-zinc-100 leading-relaxed">{{ story.caption }}</p>
            </div>
            {% endif %}
        </div>
        {% endfor %}
    {% endfor %}
</div>

<script>
    const container = document.getElementById('stories-container');
    const slides = document.querySelectorAll('.story-slide');
    const progressBar = document.getElementById('story-progress');
    let currentIdx = 0;
    let progressTimer = null;

    function updateHeaderMeta(slide) {
        if(!slide) return;
        document.getElementById('current-user-name').textContent = slide.dataset.username;
        document.getElementById('current-user-avatar').src = slide.dataset.avatar;
        document.getElementById('current-story-time').textContent = slide.dataset.time;
    }

    function playStory(index) {
        if(index < 0 || index >= slides.length) {
            window.history.back(); // Agar sab khatam toh back track karo
            return;
        }

        // Sabhi purane chal rahe videos pause karo
        slides.forEach(s => {
            const v = s.querySelector('video');
            if(v) { v.pause(); v.currentTime = 0; }
        });

        currentIdx = index;
        const currentSlide = slides[currentIdx];
        const video = currentSlide.querySelector('video');
        
        updateHeaderMeta(currentSlide);
        
        // Horizontal Scroll Position Snap 
        currentSlide.scrollIntoView({ behavior: 'smooth' });

        if (video) {
            video.play().catch(e => console.log("Autoplay dynamic handled"));
            
            // Custom Sync Progress Bar Tick
            if(progressTimer) clearInterval(progressTimer);
            progressBar.style.width = '0%';
            
            progressTimer = setInterval(() => {
                if(!video.paused && video.duration) {
                    const pct = (video.currentTime / video.duration) * 100;
                    progressBar.style.width = `${pct}%`;
                }
            }, 40);

            // Trigger Next on complete
            video.onended = () => {
                playStory(currentIdx + 1);
            };
        }
    }

    // Touch/Click left or right sides to navigate like Instagram
    window.addEventListener('click', (e) => {
        // Ignored buttons clicks
        if(e.target.closest('button') || e.target.closest('a')) return;
        
        const width = window.innerWidth;
        if(e.clientX < width * 0.3) {
            playStory(currentIdx - 1); // Left click -> Previous
        } else {
            playStory(currentIdx + 1); // Right click -> Next
        }
    });

    // Run First Video
    setTimeout(() => { playStory(0); }, 300);
</script>

</body>
</html>
