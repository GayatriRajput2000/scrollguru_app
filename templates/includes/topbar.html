
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#000000">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('ScrollGuru App Installation Ready!'))
        .catch(err => console.log('PWA Setup Failed:', err));
    });
  }
</script>

<div class="flex items-center justify-between w-full gap-2">

    <!-- LEFT: NEW INSTAGRAM-STYLE GLOWING LOGO -->
    <div onclick="window.location.href='/'" class="flex items-center gap-2 cursor-pointer select-none active:scale-95 transition-transform duration-200 shrink-0">
        <!-- Icon Layer -->
        <div class="relative w-9 h-9 flex items-center justify-center rounded-[11px] p-[2px]" 
             style="background: linear-gradient(135deg, #f9ce34 0%, #ee2a7b 50%, #6228d7 100%);">
            <!-- Outer Glow Effect -->
            <div class="absolute inset-0 rounded-[11px] blur-[6px] opacity-50" 
                 style="background: linear-gradient(135deg, #f9ce34 0%, #ee2a7b 50%, #6228d7 100%); z-index: -1;"></div>
            <!-- Dark Inner Container -->
            <div class="w-full h-full bg-black rounded-[9px] flex items-center justify-center overflow-hidden">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00f2fe" />
                            <stop offset="100%" stop-color="#4facfe" />
                        </linearGradient>
                    </defs>
                    <path d="M16 3H8C5.23858 3 3 5.23858 3 8V16C3 18.7614 5.23858 21 8 21H16C18.7614 21 21 18.7614 21 16V8C21 5.23858 18.7614 3 16 3Z" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M7 14.5C7 14.5 8.5 12 12 12C15.5 12 17 9.5 17 9.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M14 7.5L17 9.5L14 11.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
        <!-- Text Layer -->
        <div class="hidden sm:flex flex-col justify-center">
            <h1 class="text-base font-black tracking-tighter leading-none text-white">
                Scroll<span class="bg-clip-text text-transparent" style="background-image: linear-gradient(45deg, #ff007f, #7928ca);">Guru</span>
            </h1>
        </div>
    </div>

    <!-- CENTER: TIKTOK STYLE SEARCH BAR -->
    <form action="/" method="GET" class="flex-1 max-w-md mx-2 relative">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-zinc-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        <input type="text"
               name="search"
               value="{{ search_query|default:'' }}"
               placeholder="Search tips, python, tricks..."
               class="w-full bg-zinc-900/60 text-white placeholder-zinc-500 text-xs pl-10 pr-4 py-2 rounded-full border border-zinc-800/80 focus:border-zinc-700 focus:bg-zinc-950 outline-none transition-all">
    </form>

    <!-- RIGHT: AUTH AREA -->
    <div class="flex items-center gap-2 shrink-0">

        {% if user.is_authenticated %}

        <!-- STREAK PILL -->
        <div onclick="toggleDashboard(true)"
             class="flex items-center gap-1.5 bg-zinc-900/80 px-2.5 py-1.5 rounded-full border border-zinc-800/60 cursor-pointer hover:bg-zinc-800 active:scale-95 transition">
            <span class="text-sm">🔥</span>
            <span class="font-extrabold text-orange-500 text-xs">{{ streak }}</span>
        </div>

        <!-- PROFILE DROPDOWN (With Fix for Photo display) -->
        <div class="relative group">
            <div class="w-8 h-8 rounded-full overflow-hidden border border-zinc-800 flex items-center justify-center cursor-pointer">
                {% if user.profile_pic %}
                    <img src="{{ user.profile_pic.url }}" class="w-full h-full object-cover">
                {% else %}
                    <div class="w-full h-full bg-gradient-to-tr from-pink-500 to-purple-600 flex items-center justify-center text-white text-xs font-black uppercase">
                        {{ user.username|slice:":1" }}
                    </div>
                {% endif %}
            </div>

            <!-- Dropdown Menu -->
            <div class="absolute right-0 mt-2 hidden group-hover:block bg-zinc-950 border border-zinc-900 rounded-2xl w-48 shadow-2xl z-50 overflow-hidden backdrop-blur-md">
                <div class="px-4 py-3 border-b border-zinc-900 bg-zinc-900/20">
                    <p class="text-xs font-bold text-white truncate">{{ user.username }}</p>
                    <p class="text-[10px] text-zinc-500 font-medium mt-0.5">ScrollGuru Learner</p>
                </div>
                <a href="/profile/" class="flex items-center gap-2 px-4 py-2.5 text-xs text-zinc-300 hover:bg-zinc-900 transition">
                    <span>👤</span> My Profile
                </a>
                <a href="/logout/" class="flex items-center gap-2 px-4 py-2.5 text-xs text-red-400 hover:bg-zinc-900 transition border-t border-zinc-900">
                    <span>🚪</span> Logout
                </a>
            </div>
        </div>

        {% else %}

        <!-- LOGIN / SIGNUP PILLS -->
        <a href="/login/" class="bg-white text-black px-4 py-1.5 rounded-full font-bold text-xs hover:bg-zinc-200 active:scale-95 transition">
            Log In
        </a>
        <a href="/signup/" class="hidden xs:inline-block bg-zinc-900 text-zinc-300 px-4 py-1.5 rounded-full font-bold text-xs border border-zinc-800 hover:bg-zinc-800 transition">
            Sign Up
        </a>

        {% endif %}

    </div>
</div>
